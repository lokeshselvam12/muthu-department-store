<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Muthu Department Store | POS System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo-wrapper">
                    <img src="MDS.png" alt="MDS Logo" class="logo-img">
                    <h1 class="shop-name">MDS</h1>
                </div>
            </div>
            <nav class="sidebar-nav">
                <button class="nav-btn active" data-view="pos">
                    <span class="icon">🛒</span>
                    <span class="label">Point of Sale</span>
                </button>
                <button class="nav-btn" data-view="inventory">
                    <span class="icon">📦</span>
                    <span class="label">Inventory</span>
                </button>
                <button class="nav-btn" data-view="reports">
                    <span class="icon">📊</span>
                    <span class="label">Reports</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div id="live-clock" class="clock"></div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- POS View -->
            <section id="pos-view" class="view">
                <header class="view-header">
                    <h2>Categories</h2>
                    <div class="search-bar">
                        <input type="text" id="pos-search" placeholder="Search products (Name or Category)...">
                    </div>
                </header>
                <div class="pos-layout">
                    <div class="product-grid-container">
                        <div class="category-nav-container">
                            <button id="cat-scroll-left" class="scroll-btn left">‹</button>
                            <div class="category-tabs" id="category-tabs">
                                <!-- Categories will be injected here -->
                            </div>
                            <button id="cat-scroll-right" class="scroll-btn right">›</button>
                        </div>
                        <div class="product-grid" id="product-grid">
                            <!-- Products will be injected here -->
                        </div>
                    </div>
                    <aside class="cart-container">
                        <div class="cart-header">
                            <h3>Current Bill</h3>
                            <button id="clear-cart" class="btn-text">Clear All</button>
                        </div>
                        <div class="cart-items" id="cart-items">
                            <!-- Cart items will be injected here -->
                        </div>
                        <div class="cart-summary">
                            <div class="form-group">
                                <label>Customer Name</label>
                                <input type="text" id="cart-customer-name" placeholder="Optional">
                            </div>
                            <div class="summary-line">
                                <span>Subtotal</span>
                                <span id="cart-subtotal">₹0.00</span>
                            </div>
                            <div class="summary-line total">
                                <span>Grand Total</span>
                                <span id="cart-total">₹0.00</span>
                            </div>
                            <button id="checkout-btn" class="btn-primary">Checkout & Print Bill</button>
                        </div>
                    </aside>
                </div>
            </section>

            <!-- Inventory View -->
            <section id="inventory-view" class="view" style="display: none;">
                <header class="view-header">
                    <h2>Inventory Management</h2>
                    <button class="btn-primary" id="add-product-btn">+ Add Product</button>
                </header>
                <div class="inventory-table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Brand</th>
                                <th>Product Name</th>
                                <th>Category</th>
                                <th>Price (₹)</th>
                                <th>Stock</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="inventory-table-body">
                            <!-- Inventory items will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>


            <!-- Reports View -->
            <section id="reports-view" class="view" style="display: none;">
                <header class="view-header">
                    <h2>Sales Reports</h2>
                </header>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <span class="metric-label">Total Revenue</span>
                        <span class="metric-value" id="total-revenue">₹0</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Total Bills</span>
                        <span class="metric-value" id="total-bills">0</span>
                    </div>
                    <div class="metric-card">
                        <span class="metric-label">Avg. Bill Value</span>
                        <span class="metric-value" id="avg-bill">₹0</span>
                    </div>
                </div>
                <div class="sales-history">
                    <h3>Recent Transactions</h3>
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Date/Time</th>
                                <th>Customer</th>
                                <th>Items</th>
                                <th>Total</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="sales-history-body">
                            <!-- Sales history will be injected here -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Modals -->
    <div id="product-modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-title">Add New Product</h3>
            <form id="product-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>Brand Name</label>
                        <input type="text" id="prod-brand" placeholder="e.g. Tata, Aashirvaad" required>
                    </div>
                    <div class="form-group">
                        <label>Product Name</label>
                        <input type="text" id="prod-name" placeholder="e.g. Salt, Wheat" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Category</label>
                        <select id="prod-category" required>
                            <option value="Rice">Rice</option>
                            <option value="Dals">Dals</option>
                            <option value="Oil">Oil</option>
                            <option value="Salt">Salt</option>
                            <option value="Sugar & Sweeteners">Sugar & Sweeteners</option>
                            <option value="Semiya">Semiya</option>
                            <option value="Pasta">Pasta</option>
                            <option value="Noodles">Noodles</option>
                            <option value="Tea Powder">Tea Powder</option>
                            <option value="Coffee Powder">Coffee Powder</option>
                            <option value="Masala">Masala</option>
                            <option value="Pickles">Pickles</option>
                            <option value="Sauces">Sauces</option>
                            <option value="Biscuits">Biscuits</option>
                            <option value="Packaged Food">Packaged Food</option>
                            <option value="Ghee">Ghee</option>
                            <option value="Nuts">Nuts</option>
                            <option value="Shampoo">Shampoo</option>
                            <option value="Detergent Powder">Detergent Powder</option>
                            <option value="Liquid Detergent">Liquid Detergent</option>
                            <option value="Detergent Soap">Detergent Soap</option>
                            <option value="Body Soap">Body Soap</option>
                            <option value="Dishwash Soap">Dishwash Soap</option>
                            <option value="Dishwash Liquid">Dishwash Liquid</option>
                            <option value="Nutritional Drink">Nutritional Drink</option>
                            <option value="Shaving Blade">Shaving Blade</option>
                            <option value="Grains & Pulses">Grains & Pulses</option>
                            <option value="Chocolates">Chocolates</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Price (₹)</label>
                        <input type="number" id="prod-price" step="0.01" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Stock Quantity</label>
                        <input type="number" id="prod-stock" required>
                    </div>
                    <div class="form-group">
                        <label>Image URL (Optional)</label>
                        <input type="text" id="prod-image" placeholder="https://unsplash.com/...">
                    </div>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-secondary" id="close-modal">Cancel</button>
                    <button type="submit" class="btn-primary">Save Product</button>
                </div>
            </form>
        </div>
    </div>


    <!-- Scripts -->
    <script src="data.js"></script>
    <script src="pos.js"></script>
    <script src="inventory.js"></script>
    <script src="reports.js"></script>
    <script src="app.js"></script>
</body>

</html>
